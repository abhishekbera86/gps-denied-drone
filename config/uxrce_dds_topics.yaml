# =============================================================
# config/uxrce_dds_topics.yaml
# =============================================================
# Whitelisted ROS2 topics that flow through the uXRCE-DDS bridge.
# Only topics in this list are bridged between PX4 and ROS2.
# This reduces bandwidth and CPU usage.
#
# Format: Used as reference — actual topic filtering is configured
# via PX4 parameters and the uXRCE-DDS client/agent startup.
# =============================================================

# ── Topics published BY PX4, subscribed BY ROS2 (PX4 → ROS2) ──
outbound_topics:
  - name: /fmu/out/vehicle_odometry
    description: "Vehicle odometry at EKF2 rate (~50Hz)"
    msg_type: px4_msgs/msg/VehicleOdometry

  - name: /fmu/out/vehicle_status
    description: "Arming state, flight mode, failsafe flags"
    msg_type: px4_msgs/msg/VehicleStatus

  - name: /fmu/out/vehicle_local_position
    description: "Local position (NED frame)"
    msg_type: px4_msgs/msg/VehicleLocalPosition

  - name: /fmu/out/vehicle_global_position
    description: "Global position (GPS, if available)"
    msg_type: px4_msgs/msg/VehicleGlobalPosition

  - name: /fmu/out/sensor_combined
    description: "Raw IMU data (accel + gyro)"
    msg_type: px4_msgs/msg/SensorCombined

  - name: /fmu/out/battery_status
    description: "Battery voltage, current, remaining"
    msg_type: px4_msgs/msg/BatteryStatus

# ── Topics published BY ROS2, subscribed BY PX4 (ROS2 → PX4) ──
inbound_topics:
  - name: /fmu/in/vehicle_visual_odometry
    description: "VIO odometry from OpenVINS (via vio_bridge)"
    msg_type: px4_msgs/msg/VehicleVisualOdometry

  - name: /fmu/in/offboard_control_mode
    description: "Enable offboard position control (10Hz keepalive)"
    msg_type: px4_msgs/msg/OffboardControlMode

  - name: /fmu/in/trajectory_setpoint
    description: "Position/velocity setpoints for offboard mode"
    msg_type: px4_msgs/msg/TrajectorySetpoint

  - name: /fmu/in/vehicle_command
    description: "High-level commands (arm, disarm, mode change)"
    msg_type: px4_msgs/msg/VehicleCommand
