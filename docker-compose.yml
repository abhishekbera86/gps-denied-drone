# =============================================================
# docker-compose.yml — GPS-Denied Autonomous Drone Stack
# =============================================================
#
# Services are grouped by PROFILE:
#   sim  → simulation stack (px4 SITL + ros2 + dds bridge)
#   vio  → adds OpenVINS container (Phase 3+)
#   hw   → real hardware stack on Orange Pi (Phase 5)
#
# Usage (via Makefile — preferred):
#   make sim-up          → start simulation stack
#   make vio-up          → start sim + VIO
#   make hw-up           → start hardware stack
#
# Direct usage:
#   docker compose --profile sim up -d
#   docker compose --profile sim --profile vio up -d
# =============================================================

version: "3.8"

# ── Named Volumes ─────────────────────────────────────────────
# px4_build: caches the PX4 SITL build (~1.5 GB).
#   The first `docker compose build` compiles PX4 from source.
#   This volume is NOT used at runtime — the build is baked into
#   the image layer. Docker's layer cache provides persistence.
volumes:
  ros2_build_cache:
    name: ros2_build_cache

# ─────────────────────────────────────────────────────────────
# SERVICES
# ─────────────────────────────────────────────────────────────
services:

  # ── PX4 SITL + Gazebo Garden ────────────────────────────────
  # Runs the PX4 flight stack in software-in-the-loop mode.
  # PX4 binary is pre-built into the image layer (cached).
  #
  # After starting: exec in and run:
  #   cd /PX4-Autopilot && make px4_sitl gz_x500
  # Or use: make px4-start (starts SITL automatically)
  px4:
    build:
      context: .
      dockerfile: docker/Dockerfile.px4
      args:
        PX4_VERSION: ${PX4_VERSION:-v1.14.3}
    image: quad/px4-sitl:${PX4_VERSION:-v1.14.3}
    container_name: px4
    network_mode: host          # MANDATORY — DDS discovery needs host network
    environment:
      - DISPLAY=${DISPLAY:-:0}
      - PX4_HEADLESS=${PX4_HEADLESS:-1}
      - PX4_SIM_SPEED_FACTOR=${PX4_SIM_SPEED_FACTOR:-0.5}
      - PX4_GZ_MODEL=${PX4_GZ_MODEL:-x500}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:ro   # X11 socket for Gazebo GUI (optional)
    # Keep container alive — PX4 SITL is started manually or via Phase 1 scripts
    entrypoint: /bin/bash
    command: -c "sleep infinity"
    restart: "no"
    profiles: [sim]

  # ── ROS2 Humble + px4_msgs + uXRCE-DDS Agent ─────────────────
  # Main ROS2 environment. Contains:
  #   - ROS2 Humble Desktop
  #   - CycloneDDS middleware
  #   - px4_msgs (pinned to PX4_MSGS_TAG, matching PX4_VERSION)
  #   - Micro XRCE-DDS Agent (bridges PX4 uXRCE-DDS ↔ ROS2)
  #   - The ros2_ws workspace mounted as a live volume
  #
  # The DDS agent starts automatically when the container starts.
  # ROS2 nodes are launched manually or via launch files.
  ros2:
    build:
      context: .
      dockerfile: docker/Dockerfile.ros2
      args:
        PX4_MSGS_TAG: ${PX4_MSGS_TAG:-release/1.14}
        ROS_DISTRO: ${ROS_DISTRO:-humble}
    image: quad/ros2-humble:${PX4_MSGS_TAG:-release/1.14}
    container_name: ros2
    network_mode: host
    environment:
      - DISPLAY=${DISPLAY:-:0}
      - RMW_IMPLEMENTATION=${RMW_IMPLEMENTATION:-rmw_cyclonedds_cpp}
      - UXRCE_DDS_PORT=${UXRCE_DDS_PORT:-8888}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:ro
      - ./ros2_ws:/ros2_ws           # Live mount: edit on host, run in container
      - ./config:/config:ro          # Read-only config files
    # Start the uXRCE-DDS agent, then keep alive
    # The agent bridges PX4 topics to ROS2 DDS network
    entrypoint: /bin/bash
    command: >
      -c "
      echo '[ros2] Starting Micro XRCE-DDS Agent on UDP port ${UXRCE_DDS_PORT:-8888}...' &&
      MicroXRCEAgent udp4 --port ${UXRCE_DDS_PORT:-8888} &
      echo '[ros2] Agent started. Container ready.' &&
      sleep infinity
      "
    restart: "no"
    profiles: [sim]

  # ── OpenVINS — Visual-Inertial Odometry ───────────────────────
  # Added in Phase 3 (GPS-denied simulation) and Phase 5 (real hw).
  # Runs OpenVINS which subscribes to camera + IMU topics and
  # publishes /openvins/odometry (nav_msgs/Odometry, ENU frame).
  # The vio_bridge node in ros2 container converts this to PX4 format.
  #
  # Profile: vio (activate with: make vio-up)
  openvins:
    build:
      context: .
      dockerfile: docker/Dockerfile.vio
      args:
        ROS_DISTRO: ${ROS_DISTRO:-humble}
        OPENVINS_BRANCH: ${OPENVINS_BRANCH:-master}
    image: quad/openvins:${OPENVINS_BRANCH:-master}
    container_name: openvins
    network_mode: host
    environment:
      - RMW_IMPLEMENTATION=${RMW_IMPLEMENTATION:-rmw_cyclonedds_cpp}
    volumes:
      - ./config/openvins:/config/openvins:ro
    entrypoint: /bin/bash
    command: -c "sleep infinity"
    restart: "no"
    profiles: [vio]

  # ── Hardware Stack — Orange Pi (Phase 5) ──────────────────────
  # This service runs on the Orange Pi (ARM64), not on the dev machine.
  # It handles: RealSense D435i driver + OpenVINS + quad_core nodes.
  # The px4 and ros2 services above are NOT used in hardware mode.
  #
  # Profile: hw (activate with: make hw-up)
  # NOTE: Build this image on Orange Pi or cross-compile with buildx.
  realsense:
    build:
      context: .
      dockerfile: docker/Dockerfile.hw
      args:
        ROS_DISTRO: ${ROS_DISTRO:-humble}
        REALSENSE_SDK_VERSION: ${REALSENSE_SDK_VERSION:-v2.55.1}
    image: quad/realsense-arm64:${REALSENSE_SDK_VERSION:-v2.55.1}
    container_name: realsense
    network_mode: host
    privileged: true             # Required for USB device access
    environment:
      - RMW_IMPLEMENTATION=${RMW_IMPLEMENTATION:-rmw_cyclonedds_cpp}
      - UXRCE_DDS_PORT=${UXRCE_DDS_PORT:-8888}
      - PIXHAWK_SERIAL_PORT=${PIXHAWK_SERIAL_PORT:-/dev/ttyUSB0}
      - PIXHAWK_BAUD_RATE=${PIXHAWK_BAUD_RATE:-921600}
    volumes:
      - /dev:/dev                # Full device access for RealSense + UART
      - ./ros2_ws:/ros2_ws
      - ./config:/config:ro
    entrypoint: /bin/bash
    command: -c "sleep infinity"
    restart: "no"
    profiles: [hw]
