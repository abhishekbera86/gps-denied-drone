# =============================================================================
# docker-compose.yml — GPS-Denied Autonomous Drone Stack (v3 — PX4-native ROS 2)
# =============================================================================
#
# ARCHITECTURE — Phase 0/1 (sim only; hw profile added in Phase 4):
#
#   px4-sim         PX4 v1.17.0 SITL + Gazebo Harmonic (headless, x500_depth)
#   ros2-autonomy   ROS 2 Humble + px4_msgs/px4_ros_com + common_* packages
#                   Runs the Micro-XRCE-DDS-Agent bridging PX4 <-> ROS 2 topics.
#
# Both containers use host networking so the DDS agent (udp 127.0.0.1:8888,
# matching PX4's default uxrce_dds_client target) is reachable across
# containers with zero explicit port mapping.
#
# Usage:
#   make build   (first time only)
#   make sim     (starts px4-sim + ros2-autonomy)
#   make stop
# =============================================================================

volumes:
  colcon_build_cache:
    name: quad_colcon_build_cache
    # Persists colcon build output for common_* packages across restarts.

services:

  # ── PX4 SITL + Gazebo Harmonic ────────────────────────────────────────────
  px4-sim:
    build:
      context: .
      dockerfile: docker/Dockerfile.px4_sim
      args:
        PX4_VERSION: "${PX4_VERSION:-v1.17.0}"
        PX4_GZ_MODEL: "${PX4_GZ_MODEL:-x500_depth}"
    image: quad/px4-sim:v1.17.0
    container_name: px4-sim
    network_mode: host
    # PX4's pxh> shell (its foreground process) expects an interactive
    # terminal. Without one, `docker compose up -d` gives it a closed/EOF
    # stdin, and PX4's shell spins retrying reads on that closed stdin
    # instead of blocking — confirmed live: without this, `docker logs
    # px4-sim` showed hundreds of repeated `[2Kpxh>` prompt-redraw escape
    # sequences and `docker stats` showed the px4 process pinned at ~70%+
    # CPU with Gazebo's real-time factor dragged down to ~0.2. Under GUI
    # mode specifically, that CPU starvation can make the Gazebo GUI
    # client's initial scene/state sync race the drone's dynamic spawn and
    # miss it — the drone exists and simulates correctly (confirmed via
    # `gz service .../scene/info`) but never renders in the 3D view/entity
    # tree until something forces a resync (see `make gz-resync`, kept as
    # a documented fallback below in case this ever recurs). `tty`+
    # `stdin_open` give the container a real pseudo-TTY and open stdin —
    # the actual fix, not a workaround.
    tty: true
    stdin_open: true
    environment:
      PX4_HEADLESS: "1"
      # empty (default, Phase 1/2) or vio_test (Phase 3 Milestone B — colored
      # props for monocular VIO feature tracking). See
      # resource/phase3-gps-denied-localization-source.md.
      PX4_GZ_WORLD: "${PX4_GZ_WORLD:-empty}"
    devices:
      # GPU render nodes — even fully headless, Gazebo renders the
      # simulated camera sensors every sim frame, and without /dev/dri that
      # falls back to CPU software rasterization. Confirmed live
      # (2026-07-13) as the dominant real-time-factor killer: RTF ~0.02-0.03
      # without this, ~1.0 with it, on an otherwise idle 8-core host — a 40x
      # difference. This matters for MORE than speed: at RTF 0.02, the
      # README's own "PX4's EKF2 needs ~30-60s to be ready" guidance means
      # 30-60 REAL seconds only buys EKF2 ~1-2 SIMULATED seconds — nowhere
      # near enough to converge — and PX4's arm-gate is looser than "fully
      # converged," so a mission can arm anyway and get a garbage first
      # position sample. Confirmed live: a GPS-only hover test (no camera,
      # no VIO — should be the most reliable possible flight) false-tripped
      # its own geofence on the very first tick after arming without this,
      # and flew a clean, accurate hover/square mission with it. Needed for
      # BOTH `LOCALIZATION=gps` and `LOCALIZATION=vision` reliability.
      #
      # PORTABILITY: this makes GPU render nodes mandatory to start the
      # stack — on a GPU-less VM/server, `docker compose up` will fail with
      # a device-not-found error. Comment this `devices:` block out there.
      - /dev/dri:/dev/dri
    profiles: [sim]

  # ── ROS 2 Humble + PX4 uXRCE-DDS bridge ───────────────────────────────────
  ros2-autonomy:
    build:
      context: .
      dockerfile: docker/Dockerfile.ros2_autonomy
      args:
        PX4_MSGS_BRANCH: "${PX4_MSGS_BRANCH:-release/1.17}"
        PX4_ROS_COM_BRANCH: "${PX4_ROS_COM_BRANCH:-release/1.16}"
    image: quad/ros2-autonomy:humble
    container_name: ros2-autonomy
    network_mode: host
    environment:
      RMW_IMPLEMENTATION: "${RMW_IMPLEMENTATION:-rmw_cyclonedds_cpp}"
      UXRCE_DDS_PORT: "${UXRCE_DDS_PORT:-8888}"
      DRONE_NAMESPACE: "${DRONE_NAMESPACE:-drone1}"
      # Read by vio.launch.py's `world` launch argument default, so the
      # camera/IMU bridge always points at whichever Gazebo world px4-sim
      # actually started with — one env var, not two that can disagree
      # (README §12 issue 35). Same "${...:-empty}" default as px4-sim's
      # own PX4_GZ_WORLD above, for the same reason documented at README
      # §12 issue 19 (never hardcode this in .env instead).
      PX4_GZ_WORLD: "${PX4_GZ_WORLD:-empty}"
    volumes:
      - ./ros2_ws:/ros2_ws:rw
      - colcon_build_cache:/ros2_ws_build
    depends_on:
      - px4-sim
    command: tail -f /dev/null
    profiles: [sim]
