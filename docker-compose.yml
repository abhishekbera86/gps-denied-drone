# =============================================================================
# docker-compose.yml — GPS-Denied Autonomous Drone Stack
# =============================================================================
#
# ARCHITECTURE (corrected):
#
#   SIM profile  → ONE container (aerostack2/nightly-humble base)
#                  Uses as2_platform_multirotor_simulator (built-in physics)
#                  No PX4, no Gazebo, no GPU required.
#
#   HW profile   → ONE container (same base + as2_platform_pixhawk)
#                  Connects to real Pixhawk via serial UART
#                  Runs on Orange Pi 5
#
# Profiles:
#   sim  → simulation using AS2 multirotor simulator
#   hw   → real hardware (Orange Pi 5 + Pixhawk + RealSense)
#
# Usage:
#   make sim      (preferred — builds + starts + launches)
#   make hw       (on Orange Pi 5)
# =============================================================================

volumes:
  colcon_build_cache:
    name: quad_colcon_build_cache
    # Persists colcon build output inside the container across restarts.
    # Avoids rebuilding quad_core/quad_sim on every container restart.

services:

  # ── Aerostack2 Simulation Container ──────────────────────────────────────
  # Uses AS2's built-in multirotor simulator — no PX4, no Gazebo needed.
  #
  # What runs inside:
  #   - as2_platform_multirotor_simulator (physics engine)
  #   - as2_state_estimator (ground_truth plugin)
  #   - as2_motion_controller (differential flatness)
  #   - as2_behaviors_motion (Takeoff, Land, GoTo)
  #   - mission.py (via: make mission)
  #
  # All launched by:  ros2 launch quad_sim sim.launch.py
  aerostack2:
    build:
      context: .
      dockerfile: docker/Dockerfile.as2
    image: quad/aerostack2:humble
    container_name: aerostack2
    network_mode: host
    environment:
      RMW_IMPLEMENTATION: "${RMW_IMPLEMENTATION:-rmw_cyclonedds_cpp}"
      DRONE_NAMESPACE: "drone0"
      DISPLAY: ""
      QT_QPA_PLATFORM: offscreen
    volumes:
      # Source code mounted read-only — edit on host, runs in container
      - ./ros2_ws:/ros2_ws:ro
      - ./config:/config:ro
      - ./scripts:/scripts:ro
      # Colcon build cache (persists between restarts — avoids rebuilds)
      - colcon_build_cache:/ros2_ws_build
    command: tail -f /dev/null
    restart: "no"
    profiles: [sim]

  # ── Hardware Stack — Orange Pi 5 (ARM64) ──────────────────────────────────
  # Run ONLY on the Orange Pi 5 companion computer.
  #
  # What runs inside:
  #   - RealSense D435i camera driver
  #   - MicroXRCE-DDS Agent (serial → Pixhawk)
  #   - as2_platform_pixhawk (serial UART to Pixhawk)
  #   - as2_state_estimator (raw_odometry plugin — ingests OpenVINS)
  #   - as2_motion_controller
  #   - as2_behaviors_motion
  hw_stack:
    build:
      context: .
      dockerfile: docker/Dockerfile.hw
    image: quad/hw-stack:arm64
    container_name: hw_stack
    network_mode: host
    privileged: true           # Required: USB camera + UART serial access
    environment:
      RMW_IMPLEMENTATION: "${RMW_IMPLEMENTATION:-rmw_cyclonedds_cpp}"
      DRONE_NAMESPACE: "drone0"
      DISPLAY: ""
      PIXHAWK_SERIAL_PORT: "${PIXHAWK_SERIAL_PORT:-/dev/ttyUSB0}"
      PIXHAWK_BAUD_RATE: "${PIXHAWK_BAUD_RATE:-921600}"
    volumes:
      - /dev:/dev              # Full device access: USB camera + UART
      - ./ros2_ws:/ros2_ws:ro
      - ./config:/config:ro
      - ./scripts:/scripts:ro
    command: tail -f /dev/null
    restart: "no"
    profiles: [hw]
