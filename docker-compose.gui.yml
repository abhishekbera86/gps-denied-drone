# =============================================================================
# docker-compose.gui.yml — opt-in Gazebo GUI overlay for the px4-sim container
# =============================================================================
# The base docker-compose.yml runs Gazebo HEADLESS (fast, CI-friendly, no
# display needed). Layer this file on top to instead pop the real Gazebo
# Harmonic window on the host desktop so you can WATCH the drone fly:
#
#   make sim-gui                      # convenience wrapper (grants X + up)
#   # equivalently:
#   xhost +local:root
#   docker compose -f docker-compose.yml -f docker-compose.gui.yml \
#       --profile sim up -d
#
# Requires an X11 session on the host (DISPLAY set). Verified on a ThinkPad
# W541: renders on the Intel HD 4600 iGPU via Mesa. If the window is black or
# gz crashes on the GPU, force software rendering: `GZ_SW_RENDER=1 make sim-gui`
# (llvmpipe — slower but always works).
#
# Also starts `rqt-viewer` — a live /camera/camera/color/image_raw preview,
# up from the start of `make sim-gui` rather than launched manually per
# mission. This matters, not just convenience: it subscribes BEFORE any
# mission's camera_imu_bridge exists, so DDS discovery connects them
# whenever the publisher shows up, regardless of how fast/slow you start a
# mission afterward. Starting the viewer only AFTER a mission (the old
# manual `docker run` workflow) could lose the race entirely — the mission
# node's own on_exit=Shutdown() (Phase 3 Milestone B, part 9) tears the
# camera bridge down the instant the mission finishes, so a late viewer
# might never see a single frame. No GPU rendering needed for a 2D image
# widget, so this doesn't need LIBGL_ALWAYS_SOFTWARE/GZ_SW_RENDER — only
# Gazebo's 3D view does.
#
# Also starts `rviz2` (common_perception/launch/viz.launch.py) — RViz2 plus
# the state_tf_publisher node, showing the vehicle's live TF (`odom` ->
# `base_link`) and its actually-flown path (`/drone/path`). Same "up from
# the start" reasoning as rqt-viewer: state_tf_publisher subscribes to
# /fmu/out/vehicle_odometry, which PX4 publishes as soon as its estimator
# initializes — well before any mission exists — so starting it early means
# RViz shows the vehicle's pose immediately and keeps showing it across
# multiple mission runs (it is NOT part of autonomy.launch.py's
# mission-scoped on_exit=Shutdown()). Unlike rqt-viewer, this DOES need
# real GL rendering (RViz's 3D view) — same DISPLAY/DRI passthrough as
# px4-sim's Gazebo GUI. Deliberately does NOT also show the camera image —
# see viz.launch.py's docstring for why RViz's Image display was dropped
# in favor of rqt-viewer alone (resource/Vio_Drift_analysis.txt).
# =============================================================================

services:
  px4-sim:
    environment:
      # Override the base file's headless default — 0 launches the gz GUI.
      PX4_HEADLESS: "0"
      # Host X server + Qt/OpenGL knobs for GUI-in-Docker.
      DISPLAY: "${DISPLAY:-:0}"
      QT_X11_NO_MITSHM: "1"
      # 0 = hardware GL (Intel iGPU). Set GZ_SW_RENDER=1 in the environment to
      # fall back to software rendering (llvmpipe) on GPU trouble.
      LIBGL_ALWAYS_SOFTWARE: "${GZ_SW_RENDER:-0}"
    volumes:
      # X11 unix socket (host networking + local socket = no TCP X needed).
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    devices:
      # DRI render nodes so Mesa can use the GPUs (card1/renderD128 = Intel).
      - /dev/dri:/dev/dri

  rqt-viewer:
    image: quad/ros2-autonomy:humble
    container_name: rqt-viewer
    network_mode: host
    environment:
      DISPLAY: "${DISPLAY:-:0}"
      QT_X11_NO_MITSHM: "1"
      RMW_IMPLEMENTATION: "${RMW_IMPLEMENTATION:-rmw_cyclonedds_cpp}"
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    devices:
      - /dev/dri:/dev/dri
    depends_on:
      - px4-sim
    # The base image's ENTRYPOINT starts a second Micro-XRCE-DDS-Agent —
    # must be skipped here: this container shares the host network
    # namespace with ros2-autonomy (network_mode: host), which already runs
    # one bound to the same UDP port, so a second instance would either
    # fail to bind or fight over the same PX4 DDS stream. This viewer
    # doesn't need the DDS agent at all — only rqt_image_view.
    entrypoint: []
    command: bash -c "source /opt/ros/humble/setup.bash && exec ros2 run rqt_image_view rqt_image_view /camera/camera/color/image_raw"
    profiles: [sim]

  rviz2:
    image: quad/ros2-autonomy:humble
    container_name: rviz2
    network_mode: host
    environment:
      DISPLAY: "${DISPLAY:-:0}"
      QT_X11_NO_MITSHM: "1"
      LIBGL_ALWAYS_SOFTWARE: "${GZ_SW_RENDER:-0}"
      RMW_IMPLEMENTATION: "${RMW_IMPLEMENTATION:-rmw_cyclonedds_cpp}"
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      # common_perception (viz.launch.py, state_tf_publisher, quad.rviz) is
      # bind-mounted and colcon-built into the shared build-cache volume —
      # same as ros2-autonomy — not baked into the image, so this container
      # needs both to actually run `ros2 launch common_perception ...`.
      - ./ros2_ws:/ros2_ws:rw
      - colcon_build_cache:/ros2_ws_build
    devices:
      - /dev/dri:/dev/dri
    depends_on:
      - ros2-autonomy
    # See rqt-viewer's comment above: the base image's ENTRYPOINT starts a
    # second Micro-XRCE-DDS-Agent, which would conflict with ros2-autonomy's
    # over the shared host-network DDS port. RViz/state_tf_publisher only
    # need the DDS agent that's already running there.
    entrypoint: []
    command: >
      bash -c "
      test -f /ros2_ws_build/install/setup.bash || { echo 'Workspace not built yet — run: make build-ws'; exit 1; };
      source /opt/ros/humble/setup.bash &&
      source /opt/px4_ros2_ws/install/setup.bash &&
      source /ros2_ws_build/install/setup.bash &&
      exec ros2 launch common_perception viz.launch.py"
    profiles: [sim]
