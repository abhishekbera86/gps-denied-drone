# =============================================================================
# vio_d435i.yaml — OpenVINS Configuration for Intel RealSense D435i
# =============================================================================
# Calibration file for ov_msckf (OpenVINS) with the D435i depth camera.
#
# Sensor: Intel RealSense D435i
#   - Fisheye left/right infrared cameras at 640x480 @ 30fps
#   - Integrated BMI055 IMU at 400Hz
#   - Firmware 5.17.3.10, SDK 2.58.2
#
# ROS 2 topic mapping (published by ros2_realsense2_camera node):
#   /camera/infra1/image_rect_raw   → monocular infrared image
#   /camera/imu                     → IMU @ 400Hz
#   /camera/depth/image_rect_raw    → depth (not used by VIO directly)
#
# Calibration values below are from Intel RealSense factory calibration
# for the D435i in IR stereo mode. Run rs_calib or Kalibr on YOUR
# specific unit for best accuracy.
# =============================================================================

verbosity: "WARNING"         # "SILENT", "WARNING", "INFO", "DEBUG"

# ── Camera / IMU Configuration ────────────────────────────────────────────
max_cameras: 1               # Monocular VIO (use infra1 only)
use_stereo: false

# ── Feature Tracking ──────────────────────────────────────────────────────
use_klt: true                # Lucas-Kanade optical flow (robust, fast)
num_pts: 150                 # Number of tracked features
fast_threshold: 15           # FAST corner detector threshold
grid_x: 8                   # Feature grid cells X
grid_y: 5                   # Feature grid cells Y
min_px_dist: 8               # Minimum feature separation (pixels)
knn_ratio: 0.70              # KNN matching ratio threshold

# ── OpenVINS EKF Configuration ────────────────────────────────────────────
max_clones: 11               # Maximum state clone history
max_slam: 50                 # Maximum SLAM features in state
max_slam_in_update: 25       # SLAM features used per update
max_msckf_in_update: 50      # MSCKF features used per update
dt_slam_delay: 3             # Seconds to wait before initialising SLAM

# ── IMU Configuration ─────────────────────────────────────────────────────
# D435i integrated IMU (BMI055, internal to D435i module)
imu_topic: "/camera/imu"

# IMU noise parameters (D435i BMI055 datasheet values)
# Tune via Allan Variance analysis on your unit for best accuracy.
gyroscope_noise_density:      1.9e-3   # rad/s/sqrt(Hz)
gyroscope_random_walk:        1.9e-5   # rad/s^2/sqrt(Hz)
accelerometer_noise_density:  8.0e-4   # m/s^2/sqrt(Hz)
accelerometer_random_walk:    4.0e-5   # m/s^3/sqrt(Hz)

# ── Camera 0: D435i Infrared Left (infra1) ───────────────────────────────
cam0:
  topic: "/camera/infra1/image_rect_raw"
  width: 640
  height: 480

  # Camera distortion model: radtan (D435i uses pinhole + radial-tangential)
  camera_model: "pinhole"
  distortion_model: "radtan"

  # Intrinsics [fx, fy, cx, cy] — from D435i factory calibration
  # Update these with rs_calib output for your specific unit.
  intrinsics: [612.1, 612.0, 320.5, 240.0]

  # Distortion coefficients [k1, k2, p1, p2]
  distortion_coeffs: [-0.054, 0.069, 0.0014, -0.0002]

  # Camera-to-IMU extrinsic transform (T_imu_cam0)
  # The D435i infrared camera is very close to the IMU inside the module.
  # Below are approximate values from Intel's published extrinsics.
  # Run Kalibr on your unit for precise values.
  T_imu_cam:
    - [0.9999,  0.0025,  0.0145, -0.0146]
    - [-0.0025,  1.0000, -0.0001, -0.0001]
    - [-0.0145,  0.0001,  0.9999,  0.0004]
    - [0.0,      0.0,     0.0,     1.0]

  # Time offset: camera timestamp - IMU timestamp (seconds)
  # Positive = camera is ahead. Adjust if VIO drifts on fast motions.
  timeshift_cam_imu: 0.0

# ── Initialization ────────────────────────────────────────────────────────
init_window_time: 2.0        # seconds to collect initial static samples
init_imu_thresh: 0.5         # m/s^2 — max acceleration during init (keep still!)

# ── Zero Velocity Update (ZUPT) ───────────────────────────────────────────
# Helps VIO stay accurate during stationary periods.
try_zupt: true
zupt_chi2_multipler: 1.0
zupt_max_velocity: 0.1       # m/s

# ── Output Frame ─────────────────────────────────────────────────────────
# OpenVINS publishes odometry in ENU frame (East-North-Up).
# as2_state_estimator's raw_odometry plugin expects ENU — no conversion needed.
publish_global_to_imu: true

# ── ROS 2 Output Topics ───────────────────────────────────────────────────
# These are the topics the as2_state_estimator subscribes to.
output:
  pose_topic:   "/openvins/poseimu"     # geometry_msgs/PoseWithCovarianceStamped
  odom_topic:   "/openvins/odometry"    # nav_msgs/Odometry — primary AS2 input
  path_topic:   "/openvins/pathimu"     # nav_msgs/Path (for RViz debug)
