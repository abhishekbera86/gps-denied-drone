# hw_params.yaml — per-mission parameter profiles for the shared autonomy
# nodes, real-flight values (Phase 4).
#
# Same structure as sim_bringup/config/sim_params.yaml — one top-level
# section per mission, named exactly after that mission's ROS 2 node name.
# See sim_params.yaml's header comment for the full explanation of how this
# is loaded and the planned future operator-app extension point.
#
# UNTESTED — these are conservative starting points, not validated numbers.
# Retune during the tethered hover test (props off first) before trusting
# any of these on a free-flying vehicle.

# ── hover profile (Phase 4: action:=hover) ──────────────────────────────────
offboard_control_node:
  ros__parameters:
    takeoff_height_m: 1.5        # lower first-flight climb than sim (2.0)
    hover_seconds: 5.0
    control_rate_hz: 10.0
    waypoint_tolerance_m: 0.7    # looser arrival radius for real EKF/VIO drift
    max_velocity_m_s: 0.5        # slower than sim (1.0) for a first real flight
    land_disarm_low_throttle_dwell_s: 4.0  # longer than sim: real motor vibration noise
    land_disarm_max_timeout_s: 90.0        # fallback disarm: give up (stay armed) past this
    # Geofence — see sim_params.yaml's comment and offboard_control_node.py's
    # `_geofence_bounds`. Tighter than sim: a real breach isn't a SITL
    # inconvenience, it's a real vehicle leaving a controlled test area.
    geofence_margin_m: 1.0             # horizontal margin beyond the route's bounding box (m)
    geofence_height_margin_m: 1.0      # max climb above the highest point the route visits (m)
    # UNTESTED PLACEHOLDER, not derived from a real measured test area (sim's
    # 3.75 IS derived, from vio_test.sdf's actual fence position — there is
    # no equivalent fixed geometry here yet). MUST be set to
    # (nearest real wall/obstacle distance from takeoff point) - 1.0m before
    # any free flight — see offboard_control_node.py's `_geofence_bounds`.
    geofence_hard_limit_m: 10.0

# ── square mission (Phase 4: action:=mission mission:=square) ──────────────
square_mission:
  ros__parameters:
    takeoff_height_m: 1.5
    hover_seconds: 5.0
    control_rate_hz: 10.0
    waypoint_tolerance_m: 0.7
    max_velocity_m_s: 0.1
    land_disarm_low_throttle_dwell_s: 4.0  # longer than sim: real motor vibration noise
    land_disarm_max_timeout_s: 90.0        # fallback disarm: give up (stay armed) past this
    side_length_m: 2.0           # smaller footprint for a real test area
    geofence_margin_m: 1.0
    geofence_height_margin_m: 1.0
