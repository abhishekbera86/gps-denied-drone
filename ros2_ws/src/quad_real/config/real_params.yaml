# =============================================================
# quad_real/config/real_params.yaml
# =============================================================
# Real hardware parameters (Orange Pi + Pixhawk + RealSense D435i).
# Loaded by launch files in quad_real/launch/.
# =============================================================

offboard_controller:
  ros__parameters:
    # Conservative altitude for first real flights
    target_altitude_m: 1.5
    position_tolerance_m: 0.5
    keepalive_hz: 10.0
    # NEVER auto-arm on real hardware — always manual confirmation
    auto_arm: false

mission_planner:
  ros__parameters:
    waypoint_file: "mission_test.yaml"
    # Larger radius for real hardware (GPS-denied positioning less precise)
    waypoint_radius_m: 1.5
    takeoff_altitude_m: 1.5

vio_bridge:
  ros__parameters:
    # RealSense D435i IR camera topics (via realsense-ros driver)
    vio_topic: "/openvins/odometry"
    px4_topic: "/fmu/in/vehicle_visual_odometry"
    # Real hardware has more latency (image → VIO → DDS → EKF2)
    ev_delay_ms: 75.0

# Hardware-specific settings
hardware:
  # Serial port for Pixhawk connection (adjust if different)
  pixhawk_port: "/dev/ttyUSB0"
  pixhawk_baud: 921600
  # RealSense camera resolution
  camera_width: 848
  camera_height: 480
  camera_fps: 30
