# =============================================================================
# state_estimator_hw.yaml — Aerostack2 State Estimator (Real Hardware)
# =============================================================================
# Identical plugin to sim but subscribes to the same OpenVINS topic,
# which now comes from the physical RealSense D435i camera.
# =============================================================================

/**:
  ros__parameters:

    plugin_name: "raw_odometry"

    map_frame: "map"
    odom_frame: "odom"
    base_frame: "drone0/base_link"

    # OpenVINS output — same topic name in sim AND real
    odom_topic: "/openvins/odometry"

    use_gps_origin: false

    publish_tf: true
    tf_freq: 50.0
