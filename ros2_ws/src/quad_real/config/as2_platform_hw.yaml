# =============================================================================
# as2_platform_hw.yaml — Aerostack2 Platform Config (Real Hardware)
# =============================================================================
# Configuration for as2_platform_pixhawk connecting to the physical
# Pixhawk flight controller via serial (UART or USB-to-serial adapter).
#
# Connection: Orange Pi 5 (/dev/ttyUSB0) → Pixhawk TELEM2 port
# Baud rate: 921600 (configured in PX4 SER_TEL2_BAUD parameter)
#
# This file is IDENTICAL to as2_platform_sim.yaml EXCEPT for:
#   transport: serial  (vs udp in simulation)
#   device/baudrate    (vs ip/port in simulation)
# =============================================================================

/**:
  ros__parameters:

    # ── Communication with physical Pixhawk ─────────────────────────────
    transport: serial
    device: "/dev/ttyUSB0"        # Confirm with: ls /dev/serial/by-id/
    baudrate: 921600              # Must match PX4 SER_TEL2_BAUD parameter

    # ── Drone Identity ───────────────────────────────────────────────────
    namespace: "drone0"
    system_id: 1
    component_id: 1

    # ── Control Configuration ────────────────────────────────────────────
    offboard_control_mode: position

    # ── Heartbeat ────────────────────────────────────────────────────────
    cmd_freq: 30.0       # Hz

    # ── Safety Limits ────────────────────────────────────────────────────
    max_speed: 1.5       # m/s — more conservative on real hardware
    max_yaw_rate: 0.3    # rad/s
