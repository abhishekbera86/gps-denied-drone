# =============================================================================
# world.yaml — Aerostack2 World Description
# =============================================================================
# Defines the simulation world for a single GPS-denied quadrotor.
# Used by launch_as2.bash to spawn the drone and configure the Gazebo world.
# =============================================================================

world_name: empty_indoor          # Gazebo world file (no GPS satellites)

# Drones to spawn
drones:
  - model_type: quadrotor_base    # Aerostack2 base quadrotor model
    model_name: drone0            # Unique drone identifier / ROS 2 namespace
    namespace: drone0
    xyz: [0.0, 0.0, 0.3]         # Initial spawn position (0.3m above ground)
    rpy: [0.0, 0.0, 0.0]         # Initial orientation (level, facing East)
    payload:
      # Forward-facing depth camera for VIO
      - model_name: depth_camera_front
        model_type: hd_camera
        xyz: [0.1, 0.0, -0.05]   # Camera offset from drone body center
        rpy: [0.0, 0.0, 0.0]
